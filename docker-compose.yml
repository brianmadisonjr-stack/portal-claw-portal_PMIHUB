services:
  pmihub-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: pmihub-web:local
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      # Required
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Optional
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:4000}
    command: >
      sh -lc "npx prisma migrate deploy && npm run start -- --hostname 0.0.0.0 --port 4000"
